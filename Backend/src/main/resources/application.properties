spring.application.name=ecommerce-multivendor
server.port=${PORT:5454}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2020}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Payment credentials are supplied from environment variables; do not commit secrets here.
razorpay.api.key=${RAZORPAY_API_KEY:}
razorpay.api.secret=${RAZORPAY_API_SECRET:}
stripe.api.key=${STRIPE_API_KEY:}

# NVIDIA AI / chat helper settings
nvidia.api.key=${NVIDIA_API_KEY:}
nvidia.api.base-url=${NVIDIA_API_BASE_URL:https://integrate.api.nvidia.com/v1}
nvidia.api.model=${NVIDIA_API_MODEL:meta/llama-3.2-1b-instruct}
nvidia.api.temperature=${NVIDIA_API_TEMPERATURE:0.2}
nvidia.api.top-p=${NVIDIA_API_TOP_P:0.7}
nvidia.api.max-tokens=${NVIDIA_API_MAX_TOKENS:1024}
